name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: finquest_test
          POSTGRES_USER: finquest
          POSTGRES_PASSWORD: finquest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        run: |
          migrate -path backend/db/migrations \
            -database "postgresql://finquest:finquest@localhost:5432/finquest_test?sslmode=disable" \
            up

      - name: Download dependencies
        run: cd backend && go mod download

      - name: Build
        run: cd backend && go build ./...

      - name: Unit tests
        run: cd backend && go test ./services/... ./repository/... -v

      - name: Integration tests
        env:
          TEST_DATABASE_URL: "postgresql://finquest:finquest@localhost:5432/finquest_test?sslmode=disable"
        run: cd backend && go test -tags=integration -v ./...

  frontend:
    name: Frontend — lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm run test
