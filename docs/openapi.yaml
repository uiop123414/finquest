          type: string
        target_amount:
          type: number
          minimum: 1
        current_amount:
          type: number
          minimum: 0
          default: 0
        deadline:
          type: string
          format: date

    Deposit:
      type: object
      properties:
        id:
          type: string
          format: uuid
