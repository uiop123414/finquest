        remaining_balance:
          type: number
          example: 320000
          description: Текущий остаток долга
        interest_rate:
          type: number
          example: 14.9
        monthly_payment:
          type: number
          example: 12500
        note:
          type: string
        created_at:
          type: string
          format: date-time

    CreateCreditRequest:
      type: object
      required: [type, bank_name, total_amount, interest_rate]
      properties:
        type:
          type: string
          enum: [consumer, card]
        bank_name:
          type: string
        total_amount:
          type: number
          minimum: 0.01
        remaining_balance:
          type: number
          minimum: 0
          default: 0
        interest_rate:
          type: number
          minimum: 0
        monthly_payment:
          type: number
          minimum: 0
          default: 0
        note:
          type: string

