        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        note:
          type: string
        created_at:
          type: string
          format: date-time

    CreateDepositRequest:
      type: object
      required: [bank_name, amount, interest_rate, start_date, end_date]
      properties:
        bank_name:
          type: string
        amount:
          type: number
          minimum: 0.01
        interest_rate:
          type: number
          minimum: 0
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        note:
          type: string

