          type: string
          format: uuid
          nullable: true
        date:
          type: string
          format: date
          example: "2026-05-22"
        note:
          type: string
          example: Продукты
        created_at:
          type: string
          format: date-time

    CreateTransactionRequest:
      type: object
      required: [amount, type, date]
